<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>МТБ Парки 2.0</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0b0d14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="МТБ Парки">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <style>
  .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; }
  .modal.hidden { display: none; }
  .modal-content { background: white; padding: 20px; border-radius: 8px; min-width: 300px; position: relative; }
  .close-modal { position: absolute; top: 8px; right: 12px; cursor: pointer; font-size: 20px; }
  .error { color: red; margin-top: 8px; }
  .vote-widget { margin-top: 10px; }
  .vote-slider { width: 100%; margin: 4px 0; }
  .vote-labels { display: flex; justify-content: space-between; font-size: 11px; color: #888; padding: 0 2px; }
  .vote-result { margin-top: 4px; font-size: 13px; }
  .avg-bar { height: 8px; background: #e0e0e0; border-radius: 4px; margin: 4px 0; position: relative; }
  .avg-fill { height: 100%; border-radius: 4px; background: linear-gradient(to right, #8b5e3c, #4caf50); }
</style>
</head>
<body>
  <header class="header">
    <h1 class="site-title">🚵 Состояние грунта МТБ трейлов</h1>
    <div class="datetime" id="liveDateTime">--</div>
 <div class="group-switch" id="groupSwitch">
    <button class="group-btn active" data-group="mtb_parks">🚵 МТБ Парки</button>
    <button class="group-btn" data-group="mtb_mountains">🏔️ МТБ Горы</button>
    <button class="group-btn" data-group="pamps">🔄 Пампы</button>
    <button class="group-btn" data-group="favorites">⭐ Избранное</button>
  </div>
  </header>
  <main class="dashboard" id="dashboard">
    <div class="loading">⏳ Загрузка данных...</div>
  </main>
  <button class="refresh-btn" id="refreshBtn">🔄 Обновить данные</button>
  <div style="margin-top: 12px; display: flex; align-items: center; gap: 10px; justify-content: center;">
  <button id="loginBtn" class="refresh-btn">Войти</button>
  <span id="userInfo" style="display:none;">
    <span id="userEmail" style="margin-right: 8px;"></span>
    <button id="logoutBtn" class="refresh-btn">Выйти</button>
  </span>
</div>
  <div id="authModal" class="modal hidden">
  <div class="modal-content">
    <span class="close-modal">&times;</span>
    <h2 id="modalTitle">Вход</h2>
    <form id="authForm">
      <input type="email" id="authEmail" placeholder="Email" required>
      <input type="password" id="authPassword" placeholder="Пароль" required>
      <button type="submit" id="authSubmitBtn">Войти</button>
    </form>
    <p id="authToggle">Нет аккаунта? <a href="#" id="toggleMode">Зарегистрироваться</a></p>
    <div id="authError" class="error"></div>
  </div>
</div>
  <script src="js/app.js"></script>
 <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
